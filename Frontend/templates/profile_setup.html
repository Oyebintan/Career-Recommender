{% extends "base.html" %}
{% block title %}Set Up Your Profile — CareerRecommender{% endblock %}

{% block content %}
<div class="profile-setup-wrap">
  <div class="container">
    <div class="profile-setup-box">

      <div class="text-center mb-4">
        <div class="cp-badge mx-auto mb-3"><i class="fa-solid fa-id-card"></i> Step 1 of 2</div>
        <h2 style="font-size:1.9rem;font-weight:800;">Tell Us About Yourself</h2>
        <p style="color:var(--text-sub);font-size:.92rem;">
          This helps us tailor your career recommendations.
        </p>
      </div>

      <div class="cp-card">
        <form method="POST" action="{{ url_for('profile.setup') }}" novalidate>

          <div class="row g-3">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label-cp">Age</label>
                <input type="number" name="age" class="form-control-cp"
                       placeholder="e.g. 21" min="10" max="100" required
                       value="{{ profile.age if profile else '' }}">
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label-cp">Gender</label>
                <select name="gender" class="form-select-cp" required>
                  <option value="" disabled {{ 'selected' if not profile }}>Select gender</option>
                  <option value="Male"   {{ 'selected' if profile and profile.gender == 'Male' }}>Male</option>
                  <option value="Female" {{ 'selected' if profile and profile.gender == 'Female' }}>Female</option>
                  <option value="Other"  {{ 'selected' if profile and profile.gender == 'Other' }}>Other</option>
                  <option value="Prefer not to say" {{ 'selected' if profile and profile.gender == 'Prefer not to say' }}>Prefer not to say</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label-cp">Education Level</label>
            <select name="education_level" class="form-select-cp" required>
              <option value="" disabled {{ 'selected' if not profile }}>Select education level</option>
              <option value="Secondary School" {{ 'selected' if profile and profile.education_level == 'Secondary School' }}>Secondary School</option>
              <option value="Undergraduate"    {{ 'selected' if profile and profile.education_level == 'Undergraduate' }}>Undergraduate</option>
              <option value="Graduate"         {{ 'selected' if profile and profile.education_level == 'Graduate' }}>Graduate (Bachelor's)</option>
              <option value="Postgraduate"     {{ 'selected' if profile and profile.education_level == 'Postgraduate' }}>Postgraduate (Master's/PhD)</option>
              <option value="Other"            {{ 'selected' if profile and profile.education_level == 'Other' }}>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label-cp">Course / Field of Study</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-graduation-cap input-icon"></i>
              <input type="text" name="course_of_study" class="form-control-cp"
                     placeholder="e.g. Computer Science, Economics, Mass Communication"
                     required value="{{ profile.course_of_study if profile else '' }}">
            </div>
          </div>

          <button type="submit" class="btn-primary-grad w-100 justify-content-center mt-3">
            Continue to Assessment <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}a
