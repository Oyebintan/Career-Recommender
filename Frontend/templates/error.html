{% extends "base.html" %}
{% block title %}{{ code }} — CareerPath AI{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center text-center"
     style="min-height:100vh;padding:6rem 1.5rem 3rem;">
  <div style="max-width:420px;">
    <div style="font-size:4rem;font-weight:900;line-height:1;" class="gradient-text mb-2">
      {{ code }}
    </div>
    <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:.5rem;">
      {% if code == 404 %}Page Not Found{% else %}Something Went Wrong{% endif %}
    </h2>
    <p style="color:var(--text-sub);font-size:.92rem;margin-bottom:1.75rem;">
      {{ message }}
    </p>
    <a href="{{ url_for('auth.landing') }}" class="btn-primary-grad">
      <i class="fa-solid fa-house"></i> Back to Home
    </a>
  </div>
</div>
{% endblock %}
